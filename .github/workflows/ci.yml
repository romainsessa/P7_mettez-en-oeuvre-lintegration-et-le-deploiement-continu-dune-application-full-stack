name: CI

on:
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: 

permissions:
  contents: read

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
    - name: Test with Gradle Wrapper
      run: |
        chmod +x gradlew
        ./gradlew test
      working-directory: back
  test-frontend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: npm
        cache-dependency-path: front/package-lock.json
    - name: Test
      run: |
        npm ci
        npm test -- --watch=false --browsers=ChromeHeadless
      working-directory: front
  code-quality:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: npm
        cache-dependency-path: front/package-lock.json
    - name: Install Front Dependencies and Generete coverage
      run: |
        npm ci    
        npm test -- --watch=false --browsers=ChromeHeadless --code-coverage
      working-directory: front
    - name: Compile Java Classes and Generate coverage
      run: |
        chmod +x gradlew
        ./gradlew classes    
        ./gradlew test jacocoTestReport
      working-directory: back
    - name: Sonar Scan
      uses: SonarSource/sonarqube-scan-action@v6
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
  build-backend:
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
    - name: Build with Gradle Wrapper
      run: |
        chmod +x gradlew
        ./gradlew build
      working-directory: back
    - name: Upload JAR file
      uses: actions/upload-artifact@v4
      with:
        name: microcrm.jar
        path: back/build/libs/microcrm*.jar
  build-frontend:
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
    - uses: actions/checkout@v4
    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: npm
        cache-dependency-path: front/package-lock.json
    - name: Build with production mode
      run: |
        npm ci
        npm run build -- --configuration production
      working-directory: front
    - name: Upload dist directory
      uses: actions/upload-artifact@v4
      with:
        name: front-dist
        path: front/dist
