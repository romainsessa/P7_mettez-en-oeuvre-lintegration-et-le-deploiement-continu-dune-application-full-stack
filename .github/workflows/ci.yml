name: CI

on:
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: 

permissions:
  contents: read

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582 # v4.0.0
    - name: Test with Gradle Wrapper
      run: ./gradlew test
      working-directory: back
  build-backend:
    runs-on: ubuntu-latest
    needs: test-backend
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582 # v4.0.0
    - name: Build with Gradle Wrapper
      run: ./gradlew build
      working-directory: back
    - name: Upload JAR file
      uses: actions/upload-artifact@v4
      with:
        name: microcrm.jar
        path: back/build/libs/microcrm*.jar
  test-frontend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: npm
        cache-dependency-path: front/package-lock.json
    - name: Test
      run: |
        npm ci
        npm test -- --watch=false --browsers=ChromeHeadless
      working-directory: front
  build-frontend:
    runs-on: ubuntu-latest
    needs: test-frontend
    steps:
    - uses: actions/checkout@v4
    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: npm
        cache-dependency-path: front/package-lock.json
    - name: Build with production mode
      run: |
        npm ci
        npm run build -- --configuration production
      working-directory: front
    - name: Upload dist directory
      uses: actions/upload-artifact@v4
      with:
        name: front-dist
        path: front/dist
