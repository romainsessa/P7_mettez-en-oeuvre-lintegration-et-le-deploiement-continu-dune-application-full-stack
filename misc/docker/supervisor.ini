[supervisord]
nodaemon=true

[program:front]
#command = /usr/sbin/caddy run
command=/bin/sh -c "/usr/sbin/caddy run >> /logs/frontend.log 2>&1"
autostart = true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:back]
#command = /usr/bin/java -jar /app/back/app.jar
command=/bin/sh -c "/usr/bin/java -jar /app/back/app.jar >> /logs/backend.log 2>&1"
autostart = true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[unix_http_server]
file=/var/run/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory=supervisor.rpcinterface:make_main_rpcinterface
